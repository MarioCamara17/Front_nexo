<ion-content class="nexo-page-content favorites-content" [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="favorites-page">
    <div class="favorites-header">
      <h2>Mis Favoritos</h2>
      <p *ngIf="favorites.length > 0">
        {{ favorites.length }} lugar(es) guardado(s)
      </p>
    </div>

    <div class="favorites-list" *ngIf="favorites.length > 0; else noFavs">
      <app-poi-card
        class="favorite-card-item"
        *ngFor="let poi of favorites"
        [id]="poi.id"
        [title]="poi.name"
        [info]="poi.description"
        [image]="poi.image"
        [video]="poi.video"
        [isFavoritePage]="false"
        (cardClick)="openModal(poi)"
        (remove)="onRemove($event)"
      >
      </app-poi-card>
    </div>

    <ng-template #noFavs>
      <div class="empty-favorites">
        <div class="empty-icon">♡</div>
        <h3>No tienes favoritos todavía</h3>
        <p>
          Explora lugares turísticos y toca el corazón para guardarlos aquí.
        </p>
      </div>
    </ng-template>
  </div>
</ion-content>
